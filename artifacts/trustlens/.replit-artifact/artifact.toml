kind = "web"
previewPath = "/"
title = "TrustLens AI – Digital Trust Analyzer"
version = "1.0.0"
id = "artifacts/trustlens"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19629

[services.development]
run = "pnpm --filter @workspace/trustlens run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/trustlens", "run", "build" ]
publicDir = "artifacts/trustlens/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19629"
BASE_PATH = "/"
